name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # bring up Redis alongside the runner
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        # optional healthcheck so Actions waits until Redis is ready
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.13.3]

    # make CELERY_BROKER_URL available to all steps
    env:
      CELERY_BROKER_URL: redis://localhost:6379/0

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        grep -v "appscript" requirements.txt > requirements_ci.txt
        pip install -r requirements_ci.txt

    - name: Setup Django Settings
      run: |
        cd FWMsg
        cp FWMsg/.example-secrets.json FWMsg/.secrets.json
        sed -i 's#/var/log/django/error.log#/tmp/django_error.log#g' FWMsg/settings.py
    - name: Setup npm dependencies
      run: |
        cd FWMsg
        npm install
    - name: Run Tests
      run: |
        cd FWMsg
        python manage.py collectstatic --noinput
        python manage.py test --parallel 20 -v 3
